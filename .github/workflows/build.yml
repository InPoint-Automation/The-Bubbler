name: Build (Nuitka)
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04             # glibc 2.35
            artifact: Bubbler-linux      # CUDA build
            lowmem: "0"
          - os: windows-latest
            artifact: Bubbler-windows    # DirectML build
            lowmem: "0"
          - os: macos-latest
            artifact: Bubbler-macos      # CPU
            lowmem: "1"
    runs-on: ${{ matrix.os }}
    env:
      BUBBLER_VISION: "1"
      BUBBLER_JOBS: "2"
      BUBBLER_LOWMEM: ${{ matrix.lowmem }}

    steps:
      - uses: actions/checkout@v4

      # Build deps
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf binutils clang \
            libgl1 libxrender1 libxcb-cursor0 libegl1 \
            libxkbcommon0 libdbus-1-3
          # patchelf: Nuitka patches RPATH. binutils: readelf/objcopy.
          # clang: build.py defaults to --clang on Linux. (Windows uses MSVC.)

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Cache Nuitka's output
      - name: Cache Nuitka + ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/AppData/Local/Nuitka/Nuitka
            ~/Library/Caches/Nuitka
            ~/.cache/ccache
            ~/AppData/Local/ccache
            ~/Library/Caches/ccache
          key: nuitka-${{ runner.os }}-${{ hashFiles('requirements-build-*.txt') }}

      # CUDA on Linux, DirectML on Windows
      - name: Create build venv
        run: python packaging/make_build_venv.py

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: .build-venv/bin/python packaging/build.py

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .build-venv\Scripts\python packaging\build.py

      # Wrap the dist into .AppImage
      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: .build-venv/bin/python packaging/make_appimage.py

      # The macOS build is a .app DIRECTORY
      - name: Package macOS .app
        if: runner.os == 'macOS'
        run: ditto -c -k --sequesterRsrc --keepParent bin/Bubbler.app bin/Bubbler-macos.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            bin/Bubbler.exe
            bin/Bubbler-x86_64.AppImage
            bin/Bubbler-macos.zip
          if-no-files-found: ignore
          retention-days: 14

