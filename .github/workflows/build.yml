name: Build (Nuitka)
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}
jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact: Bubbler-linux
            lowmem: "0"
          - os: windows-latest
            artifact: Bubbler-windows
            lowmem: "1"
          - os: macos-latest
            artifact: Bubbler-macos
            lowmem: "1"
    runs-on: ${{ matrix.os }}
    env:
      BUBBLER_VISION: "1"
      BUBBLER_JOBS: "2"
      BUBBLER_LOWMEM: ${{ matrix.lowmem }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux system deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            patchelf binutils clang \
            libgl1 libxrender1 libxcb-cursor0 libegl1 \
            libxkbcommon0 libdbus-1-3
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Cache Nuitka + ccache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/Nuitka
            ~/AppData/Local/Nuitka/Nuitka
            ~/Library/Caches/Nuitka
            ~/.cache/ccache
            ~/AppData/Local/ccache
            ~/Library/Caches/ccache
          key: nuitka-${{ runner.os }}-${{ hashFiles('requirements-build-*.txt') }}
      - name: Create build venv
        run: python packaging/make_build_venv.py
      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: .build-venv/bin/python packaging/build.py
      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: .build-venv\Scripts\python packaging\build.py
      - name: Package AppImage (Linux)
        if: runner.os == 'Linux'
        run: .build-venv/bin/python packaging/make_appimage.py
      - name: Package macOS .dmg
        if: runner.os == 'macOS'
        run: |
          hdiutil create -volname Bubbler -srcfolder bin/Bubbler.app \
            -ov -format UDZO bin/Bubbler-macos.dmg
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            bin/Bubbler.exe
            bin/Bubbler-x86_64.AppImage
            bin/Bubbler-macos.dmg
          if-no-files-found: ignore
          retention-days: 14
      - name: Attach to release
        if: success() && startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/Bubbler.exe
            bin/Bubbler-x86_64.AppImage
            bin/Bubbler-macos.dmg
          fail_on_unmatched_files: false